<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRAGE — CT ПОЗИЦІЇ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 350px));
            justify-content: center;
            gap: 20px;
            max-width: 850px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .pos-card {
            background: #14161d;
            border: 1px solid #232733;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .pos-card-img-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
        }

        .pos-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .pos-card-title {
            padding: 14px;
            text-align: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
            margin: 0;
            background: #14161d;
            transition: color 0.3s ease;
        }

        .pos-card:hover {
            border-color: #4b69ff;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(75, 105, 255, 0.25);
        }

        .pos-card:hover img {
            transform: scale(1.08);
        }

        .pos-card:hover .pos-card-title {
            color: #4b69ff;
        }
    </style>
</head>
<body>

    <header>
        <a href="side.html">← НАЗАД</a>
        <h1>MIRAGE — CT ПОЗИЦІЇ</h1>
    </header>

    <main>

        <div class="positions-grid">

            <!-- 1. ONE WAY PIT [A] -->
            <a href="ct-smoke-pit.html" class="pos-card">
                <div class="pos-card-img-wrapper">
                    <img src="фото/ct-smoke-pit.png" alt="One Way Pit" onerror="this.src='фото/ct-smoke-pit.jpg'">
                </div>
                <h3 class="pos-card-title">One Way у Pit з проходом [A]</h3>
            </a>

            <!-- 2. МОМЕНТАЛКА ПІД ТІММЕЙТА [B] -->
            <a href="ct-flash-apps-b.html" class="pos-card">
                <div class="pos-card-img-wrapper">
                    <img src="фото/ct-flash-apps-b.png" alt="Flash Apps B" onerror="this.src='фото/ct-flash-apps-b.jpg'">
                </div>
                <h3 class="pos-card-title">Моменталка під пік Тіммейту в Apps [B]</h3>
            </a>

        </div>

    </main>

</body>
</html>
