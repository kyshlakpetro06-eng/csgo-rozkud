<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANCIENT — Т ПОЗИЦІЇ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 350px));
            justify-content: center;
            gap: 20px;
            max-width: 850px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .pos-card {
            background: #14161d;
            border: 1px solid #232733;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .pos-card-img-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
        }

        .pos-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .pos-card-title {
            padding: 12px;
            text-align: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
            margin: 0;
            background: #14161d;
            transition: color 0.3s ease;
        }

        /* 💥 АНІМАЦІЯ ПРИ НАВЕДЕННІ */
        .pos-card:hover {
            border-color: #ff4655;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 70, 85, 0.2);
        }

        .pos-card:hover img {
            transform: scale(1.08);
        }

        .pos-card:hover .pos-card-title {
            color: #ff4655;
        }
    </style>
</head>
<body>

    <header>
        <a href="ancient.html">← НАЗАД</a>
        <h1>ANCIENT — Т ПОЗИЦІЇ</h1>
    </header>

    <main>

        <div class="positions-grid">

            <!-- КЛІК ВЕДЕ НА ancient-b-site.html -->
            <a href="ancient-b-site.html" class="pos-card">
                <div class="pos-card-img-wrapper">
                    <img src="фото/ancient-b-site.png" alt="B Site" onerror="this.src='фото/b-stand-1.png'">
                </div>
                <h3 class="pos-card-title">Розкид B site</h3>
            </a>

        </div>

    </main>

</body>
</html>
