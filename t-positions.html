<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Позиції за Терористів</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Кнопка повернення на вибір сторони -->
        <a href="side.html" class="btn-back">← Назад до вибору сторони</a>

        <h1>ПОЗИЦІЇ (TERRORISTS)</h1>

        <div class="flex-row">
            <!-- 1. Кнопка для WINDOW -->
            <a href="t-window.html" class="pos-link">
                <div class="card">
                    <img src="t-window.png" alt="Розкид Window">
                    <div class="card-label">Розкид Window</div>
                </div>
            </a>

            <!-- 2. Кнопка для CONNECTOR -->
            <a href="t-connector.html" class="pos-link">
                <div class="card">
                    <img src="t-connector.png" alt="Розкид Connector">
                    <div class="card-label">Розкид Connector</div>
                </div>
            </a>

            <!-- 3. Кнопка для A SITE -->
            <a href="t-asite.html" class="pos-link">
                <div class="card">
                    <!-- Картинка, яку ти назвеш t-asite.png -->
                    <img src="t-asite.png" alt="Розкид A Site">
                    <div class="card-label">Розкид A Site</div>
                </div>
            </a>

            <!-- 4. Кнопка для B SITE -->
            <a href="t-bsite.html" class="pos-link">
                <div class="card">
                    <!-- Залишаємо під майбутню картинку для Б-пленту -->
                    <img src="t-bsite.png" alt="Розкид B Site">
                    <div class="card-label">Розкид B Site</div>
                </div>
            </a>
        </div>
