<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 TAKTICS — ОБЕРИ КАРТУ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .maps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 30px auto;
            padding: 0 15px;
        }

        /* Основна картка */
        .map-card {
            background: #14161d;
            border: 1px solid #232733;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .map-card-img-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden; /* Щоб картинка не виходила за межі при зумі */
        }

        .map-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease; /* Плавний зум */
        }

        .map-card-title {
            padding: 15px;
            text-align: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 18px;
            margin: 0;
            background: #14161d;
            transition: color 0.3s ease;
        }

        /* 💥 ЕФЕКТИ ПРИ НАВЕДЕННІ (HOVER) */
        .map-card:hover {
            border-color: #ff4655; /* Червона рамка */
            transform: translateY(-5px); /* Легке піднімання картки */
            box-shadow: 0 8px 20px rgba(255, 70, 85, 0.2); /* Червоне сяйво */
        }

        .map-card:hover img {
            transform: scale(1.08); /* Ефект зближення фотографії */
        }

        .map-card:hover .map-card-title {
            color: #ff4655; /* Текст стає червоним */
        }
    </style>
</head>
<body>

    <header>
        <h1>ОБЕРИ КАРТУ</h1>
    </header>

    <main>

        <div class="maps-grid">

            <!-- MIRAGE -->
            <a href="side.html" class="map-card">
                <div class="map-card-img-wrapper">
                    <img src="фото/mirage.png" alt="Mirage" onerror="this.src='фото/mirage.jpg'">
                </div>
                <h3 class="map-card-title">Mirage</h3>
            </a>

            <!-- ANCIENT -->
            <a href="ancient.html" class="map-card">
                <div class="map-card-img-wrapper">
                    <img src="фото/ancient.png" alt="Ancient" onerror="this.src='фото/ancient.jpg'">
                </div>
                <h3 class="map-card-title">Ancient</h3>
            </a>

        </div>

    </main>

</body>
</html>
