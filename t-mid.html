<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRAGE — РОЗКИД MID</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .pos-card {
            background: #14161d;
            border: 1px solid #232733;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .pos-card-img-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
        }

        .pos-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .pos-card-title {
            padding: 14px;
            text-align: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
            margin: 0;
            background: #14161d;
            transition: color 0.3s ease;
        }

        .pos-card:hover {
            border-color: #ff4655;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 70, 85, 0.2);
        }

        .pos-card:hover img {
            transform: scale(1.08);
        }

        .pos-card:hover .pos-card-title {
            color: #ff4655;
        }
    </style>
</head>
<body>

    <header>
        <a href="t-positions.html">← НАЗАД</a>
        <h1>MIRAGE — РОЗКИД MID</h1>
    </header>

    <main>

        <div class="positions-grid">

            <!-- 1. SMOKE WINDOW -->
            <a href="t-smoke-window.html" class="pos-card">
                <div class="pos-card-img-wrapper">
                    <img src="фото/t-mid-window.png" alt="Smoke Window">
                </div>
                <h3 class="pos-card-title">Смок у Window (Вікно)</h3>
            </a>

            <!-- 2. SMOKE CONNECTOR -->
            <a href="t-smoke-connector.html" class="pos-card">
                <div class="pos-card-img-wrapper">
                    <img src="фото/t-mid-connector.png" alt="Smoke Connector">
                </div>
                <h3 class="pos-card-title">Смок у Connector (Коннектор)</h3>
            </a>

            <!-- 3. SMOKE SHORT -->
            <a href="t-smoke-short.html" class="pos-card">
                <div class="pos-card-img-wrapper">
                    <img src="фото/t-mid-short.png" alt="Smoke Short">
                </div>
                <h3 class="pos-card-title">Смок на Short (Шорт)</h3>
            </a>

            <!-- 4. ФЛЕШКА TYPE-C -->
            <a href="t-flash-mid.html" class="pos-card">
                <div class="pos-card-img-wrapper">
                    <img src="фото/t-mid-flash.png" alt="Flash Type-C Mid">
                </div>
                <h3 class="pos-card-title">Флешка під вихід Tімейта на Mid</h3>
            </a>

        </div>

    </main>

</body>
</html>
