<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANCIENT — СТОРОНА</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .sides-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 850px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .side-card {
            background: #14161d;
            border: 1px solid #232733;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .side-card-img-wrapper {
            width: 100%;
            height: 220px;
            overflow: hidden;
        }

        .side-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .side-card-title {
            padding: 15px;
            text-align: center;
            color: #ff4655;
            font-weight: bold;
            font-size: 16px;
            margin: 0;
            background: #14161d;
        }

        /* 💥 АНІМАЦІЯ ПРИ НАВЕДЕННІ */
        .side-card:hover {
            border-color: #ff4655;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 70, 85, 0.2);
        }

        .side-card:hover img {
            transform: scale(1.08);
        }

        /* Неактивний CT */
        .side-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .side-card.disabled:hover {
            border-color: #232733;
            transform: none;
            box-shadow: none;
        }

        .side-card.disabled:hover img {
            transform: none;
        }

        .side-card.disabled .side-card-title {
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">← НАЗАД</a>
        <h1>ANCIENT</h1>
    </header>

    <main>

        <div class="sides-grid">

            <!-- ВЕДЕ НА ancient-t-side.html -->
            <a href="ancient-t-side.html" class="side-card">
                <div class="side-card-img-wrapper">
                    <img src="фото/t-side.jpg" alt="Terrorists" onerror="this.src='фото/t-side.png'">
                </div>
                <h3 class="side-card-title">Terrorists (T)</h3>
            </a>

            <!-- СТ (СКОРО) -->
            <div class="side-card disabled">
                <div class="side-card-img-wrapper">
                    <img src="фото/ct-side.jpg" alt="CT" onerror="this.src='фото/ct-side.png'">
                </div>
                <h3 class="side-card-title">CT (Скоро)</h3>
            </div>

        </div>

    </main>

</body>
</html>
